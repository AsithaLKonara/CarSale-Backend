version: '3.8'

services:
  # 1. Relational Database Server
  postgres:
    image: postgres:15-alpine
    container_name: ultradrive-postgres
    restart: always
    environment:
      POSTGRES_USER: asithalakmal
      POSTGRES_DB: ultradrive
      POSTGRES_HOST_AUTH_METHOD: trust # Local dev-friendly trust auth
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 2. Redis Caching Cluster
  redis:
    image: redis:alpine
    container_name: ultradrive-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  # 3. Express Application API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ultradrive-backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://asithalakmal@postgres:5432/ultradrive?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secure_ultradrive_jwt_core_access_secret_phrase
      NODE_ENV: production
    ports:
      - '5000:5000'
    volumes:
      - backend-uploads:/Users/asithalakmal/Documents/web/CarSale/public/uploads

  # 4. Next.js Showroom Client
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ultradrive-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  postgres-data:
  redis-data:
  backend-uploads:
