version: '3.8'

services:
  # 1. Relational Database Server (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: ultradrive-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ultradrive
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 2. Redis Caching Cluster
  redis:
    image: redis:alpine
    container_name: ultradrive-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  # 3. Express Application API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ultradrive-backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ultradrive?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ultradrive_jwt_secret
      JWT_REFRESH_SECRET: ultradrive_refresh_secret
      NODE_ENV: production
    ports:
      - '5001:5001'
    volumes:
      - backend-uploads:/app/public/uploads

  # 4. Next.js Showroom Client
  frontend:
    build:
      context: ../CarSale
      dockerfile: Dockerfile
    container_name: ultradrive-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  postgres-data:
  redis-data:
  backend-uploads:
